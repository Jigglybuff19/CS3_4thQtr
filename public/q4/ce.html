Here’s a complete, self-contained example of a star rating system in HTML, CSS, and JavaScript.
It’s accessible, works without external libraries, and supports hover effects and click selection.

⭐ Star Rating Example
Html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Rating</title>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    .star-rating {
        direction: rtl; /* Right-to-left for easier CSS handling */
        display: inline-flex;
        font-size: 2rem;
        cursor: pointer;
    }

    .star-rating input {
        display: none; /* Hide radio buttons */
    }

    .star-rating label {
        color: #ccc;
        transition: color 0.2s;
    }

    /* Hover effect */
    .star-rating label:hover,
    .star-rating label:hover ~ label {
        color: gold;
    }

    /* Selected stars */
    .star-rating input:checked ~ label {
        color: gold;
    }
</style>
</head>
<body>

<h2>Rate this product:</h2>

<form id="ratingForm">
    <div class="star-rating">
        <input type="radio" id="star5" name="rating" value="5">
        <label for="star5">&#9733;</label>

        <input type="radio" id="star4" name="rating" value="4">
        <label for="star4">&#9733;</label>

        <input type="radio" id="star3" name="rating" value="3">
        <label for="star3">&#9733;</label>

        <input type="radio" id="star2" name="rating" value="2">
        <label for="star2">&#9733;</label>

        <input type="radio" id="star1" name="rating" value="1">
        <label for="star1">&#9733;</label>
    </div>
</form>

<p id="result"></p>

<script>
        const Movies = {
            Title: document.getElementById('Movie Title'),
            Year: document.getElementById('Year'),
            Genre: document.getElementById('Genre'),
        }
</script>

</body>
</html>
